<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('커밋 & Push · ' + ${workspace.repoOwner + '/' + workspace.repoName})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">

    <section class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></section>
    <section class="alert alert-info" th:if="${infoMessage}" th:text="${infoMessage}"></section>

    <section class="card">
        <h1 class="card-title">커밋 &amp; Push</h1>
        <p class="card-desc">
            현재 워크스페이스 변경 사항을 커밋하고 fork의 feature branch로 push합니다. Force push는 사용하지 않습니다.
        </p>

        <dl class="info-list">
            <dt>저장소</dt><dd th:text="${workspace.repoOwner + '/' + workspace.repoName}">owner/repo</dd>
            <dt>Fork URL</dt><dd th:text="${workspace.forkUrl}">fork</dd>
            <dt>작업 브랜치</dt><dd><code th:text="${workspace.branchName}">branch</code></dd>
            <dt>로컬 경로</dt><dd><code th:text="${workspace.workspacePath}">path</code></dd>
        </dl>

        <form th:action="@{/web/workspaces/{repoOwner}/{repoName}/commit-push(repoOwner=${workspace.repoOwner}, repoName=${workspace.repoName})}"
              method="post"
              class="stack-form">
            <label for="message">커밋 메시지</label>
            <textarea id="message"
                      name="message"
                      rows="5"
                      maxlength="4096"
                      required
                      placeholder="Refactor ..."
                      th:text="${submittedMessage != null ? submittedMessage : defaultCommitMessage}"></textarea>

            <label for="authorName">작성자 이름</label>
            <input id="authorName" name="authorName" type="text" maxlength="255" required th:value="${authorName}">

            <label for="authorEmail">작성자 이메일</label>
            <input id="authorEmail" name="authorEmail" type="email" maxlength="255" required th:value="${authorEmail}">

            <div class="action-row">
                <button type="submit" class="btn btn-primary btn-lg">커밋 + Push</button>
                <a class="btn btn-secondary"
                   th:href="@{/web/workspaces/{repoOwner}/{repoName}/diff(repoOwner=${workspace.repoOwner}, repoName=${workspace.repoName})}">변경점으로 돌아가기</a>
                <div th:replace="~{fragments/workspace-actions :: restart(${workspace.repoOwner}, ${workspace.repoName})}"></div>
            </div>
        </form>
    </section>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
