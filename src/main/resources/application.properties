spring.application.name=GitHub-Copilot-With-Cursor

server.port=8080

# === DataSource (MySQL) =====================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/GitHubCopilotWithCursor?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA =====================================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# === Flyway ==================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# === Thymeleaf ==============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# === Workspace properties ===================================================
app.workspace.root=${java.io.tmpdir}/refactor-workspace
app.workspace.allowed-hosts[0]=github.com
app.workspace.ide-command=cursor
app.workspace.diff.max-file-bytes=1048576
app.workspace.diff.max-total-bytes=52428800
app.workspace.delete.sync-retry-count=12
app.workspace.delete.sync-initial-delay-ms=500
app.workspace.delete.sync-max-delay-ms=5000
app.workspace.delete.background-retry-count=30
app.workspace.delete.background-initial-delay-ms=3000
app.workspace.delete.background-max-delay-ms=30000
app.workspace.delete.cleanup-interval-ms=300000

# === GitHub API (Contribute mode) ==========================================
app.github.api-base-url=https://api.github.com
app.github.api-version=2022-11-28
app.github.token=${GITHUB_TOKEN:}

# === Cursor Cloud Agents API (v3) ===========================================
app.cursor.api-base-url=https://api.cursor.com
app.cursor.api-version=v1
app.cursor.api-key=${CURSOR_API_KEY:}
app.cursor.client-name=github-copilot-with-cursor/v3.0.2
app.cursor.agent.poll-interval-ms=5000
app.cursor.agent.poll-backoff-on-busy-ms=10000
app.cursor.agent.poll-backoff-max-ms=30000
app.cursor.agent.timeout-ms=600000
app.cursor.composer.enabled=true
app.cursor.composer.max-files=50
app.cursor.composer.max-patch-bytes=131072
app.cursor.composer.timeout-ms=120000

# === Contribute mode ========================================================
app.contribute.branch-prefix=refactor
app.contribute.branch-timestamp-pattern=yyyyMMddHHmm
app.contribute.fork-ready-max-attempts=15
app.contribute.fork-ready-delay-ms=2000

# === Actuator / OpenAPI =====================================================
management.endpoints.web.exposure.include=health,info
springdoc.swagger-ui.path=/swagger-ui.html

# === Logging ================================================================
logging.level.com.demo.githubcopilotwithcursor=INFO
logging.level.org.eclipse.jgit=WARN
