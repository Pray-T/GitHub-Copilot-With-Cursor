spring.datasource.url=${TEST_DB_URL:jdbc:mysql://localhost:3306/GitHubCopilotWithCursor_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.workspace.root=build/tmp/test-workspaces
app.workspace.allowed-hosts[0]=github.com
app.workspace.ide-command=cursor
app.workspace.diff.max-file-bytes=1048576
app.workspace.diff.max-total-bytes=52428800

spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false
